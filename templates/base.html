<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dashboard{% endblock %} — DC Flight Alerts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-semibold" href="/">
      <i class="bi bi-airplane-fill text-primary me-2"></i>DC Flight Alerts
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'destinations' %}active{% endif %}" href="/destinations">
            <i class="bi bi-geo-alt me-1"></i>Destinations
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'history' %}active{% endif %}" href="/history">
            <i class="bi bi-graph-up me-1"></i>Price History
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'alerts' %}active{% endif %}" href="/alerts">
            <i class="bi bi-bell me-1"></i>Alerts
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'schedule' %}active{% endif %}" href="/schedule">
            <i class="bi bi-calendar3 me-1"></i>Schedule
          </a>
        </li>
      </ul>
      <div id="budgetBadge" class="ms-2 text-muted small">
        <i class="bi bi-arrow-repeat spin me-1"></i>Loading...
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
<script>
/* Table sorting — works on any <table class="sortable"> with th[data-sort] */
(function () {
  function cellVal(tr, idx) {
    var td = tr.children[idx];
    return td.dataset.sortValue !== undefined
      ? td.dataset.sortValue
      : (td.innerText || td.textContent).trim();
  }
  function cmp(a, b, idx, asc, type) {
    var v1 = cellVal(asc ? a : b, idx), v2 = cellVal(asc ? b : a, idx);
    if (type === 'num')  return (parseFloat(v1.replace(/[^0-9.\-]/g,''))||0) - (parseFloat(v2.replace(/[^0-9.\-]/g,''))||0);
    if (type === 'date') return (new Date(v1)||0) - (new Date(v2)||0);
    return v1.localeCompare(v2);
  }
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('table.sortable thead th[data-sort]').forEach(function (th) {
      th.addEventListener('click', function () {
        var table = th.closest('table'), tbody = table.querySelector('tbody');
        var idx = Array.from(th.parentNode.children).indexOf(th), type = th.dataset.sort;
        var wasAsc = th.classList.contains('sort-asc');
        th.parentNode.querySelectorAll('th').forEach(function (t) { t.classList.remove('sort-asc','sort-desc'); });
        th.classList.add(!wasAsc ? 'sort-asc' : 'sort-desc');
        Array.from(tbody.querySelectorAll('tr'))
          .sort(function (a, b) { return cmp(a, b, idx, !wasAsc, type); })
          .forEach(function (tr) { tbody.appendChild(tr); });
      });
    });
  });
})();
</script>
<script>
  fetch('/api/status')
    .then(r => r.json())
    .then(d => {
      const cls = d.pct_used > 90 ? 'danger' : d.pct_used > 70 ? 'warning' : 'success';
      const src = d.source === 'serpapi' ? '✓' : '~';
      document.getElementById('budgetBadge').innerHTML =
        `<span class="badge bg-${cls}" title="${d.source === 'serpapi' ? 'Live from SerpApi' : 'Local estimate'}"><i class="bi bi-lightning-charge-fill me-1"></i>${src} ${d.monthly_usage} / ${d.budget} credits</span>`;
    })
    .catch(() => {
      document.getElementById('budgetBadge').innerHTML = '';
    });
</script>
</body>
</html>
